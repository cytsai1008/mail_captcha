name = "mail-captcha"
main = "src/index.js"
compatibility_date = "2025-01-01"

[assets]
directory = "./public"
binding = "ASSETS"

# Required secrets (set via Cloudflare dashboard or CLI):
#   wrangler secret put RECAPTCHA_SECRET_KEY
#   wrangler secret put MAIL_TO_EMAIL
# The public reCAPTCHA site key is hardcoded in public/index.html (not a secret).
