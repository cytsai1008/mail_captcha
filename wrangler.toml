name = "mail-captcha"
main = "src/index.js"
compatibility_date = "2025-01-01"

[assets]
directory = "./public"
binding = "ASSETS"

# Required secrets (set via Cloudflare dashboard or CLI):
#   wrangler secret put RECAPTCHA_SECRET_KEY
#   wrangler secret put MAIL_TO_EMAIL
# The public reCAPTCHA site key is hardcoded in public/index.html (not a secret).
[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
